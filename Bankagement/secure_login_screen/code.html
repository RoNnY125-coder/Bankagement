<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Secure Login</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden max-w-[480px] mx-auto bg-background-light dark:bg-background-dark">
<!-- Header Section -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12 uppercase tracking-widest text-xs opacity-70">Secure Banking</h2>
</div>
<!-- Hero Branding -->
<div class="flex flex-col items-center pt-8 pb-10 px-6">
<div class="bg-primary/10 p-4 rounded-xl mb-6">
<span class="material-symbols-outlined text-primary text-5xl">shield_person</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight text-center">Welcome Back</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pt-2 text-center">Please enter your credentials to access your account securely</p>
</div>
<!-- Form Section -->
<div class="px-6 space-y-5">
<!-- Mobile/Email Input -->
<div class="group relative">
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal pb-1.5 ml-1">Mobile Number or Email</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person</span>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 h-14 pl-12 pr-4 placeholder:text-slate-400 dark:placeholder:text-slate-600 text-base font-normal transition-all" placeholder="name@example.com" type="text" value=""/>
</div>
</label>
</div>
<!-- Password Input -->
<div class="group relative">
<label class="flex flex-col w-full">
<div class="flex justify-between items-center pb-1.5 ml-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal">Password</p>
<a class="text-primary text-sm font-semibold hover:underline" href="#">Forgot?</a>
</div>
<div class="flex w-full items-stretch relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 h-14 pl-12 pr-12 placeholder:text-slate-400 dark:placeholder:text-slate-600 text-base font-normal transition-all" placeholder="••••••••" type="password" value=""/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 cursor-pointer">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</label>
</div>
<!-- Sign In Button -->
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span>Sign In</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
<!-- Biometric Section -->
<div class="mt-10 flex flex-col items-center">
<p class="text-slate-500 dark:text-slate-500 text-xs font-bold uppercase tracking-widest mb-4">Quick Access</p>
<button class="bg-primary/10 hover:bg-primary/20 p-5 rounded-full text-primary transition-colors border border-primary/20">
<span class="material-symbols-outlined text-4xl">face</span>
</button>
<p class="text-slate-600 dark:text-slate-400 text-sm mt-3 font-medium">Use Face ID to login</p>
</div>
<!-- Footer Navigation -->
<div class="mt-auto pb-10 px-6 text-center">
<p class="text-slate-600 dark:text-slate-400 text-sm">
                New to the bank? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Register Now</a>
</p>
</div>
<!-- Security Badge -->
<div class="flex items-center justify-center gap-2 pb-6 opacity-40">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">End-to-end Encrypted</span>
</div>
</div>
</body></html>
