<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Bank Splash Screen</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex min-h-screen w-full flex-col bg-gradient-to-b from-background-dark via-[#0d1a35] to-background-dark overflow-hidden">
<!-- Top App Bar Space / Header -->
<div class="flex items-center p-6 justify-between">
<div class="text-slate-100/50 flex size-10 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-2xl" style="">shield_lock</span>
</div>
<div class="text-slate-100/50 flex size-10 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-2xl" style="">wifi_protected_setup</span>
</div>
</div>
<!-- Main Content Area -->
<div class="flex flex-1 flex-col items-center justify-center p-6 @container">
<div class="flex flex-col items-center gap-12">
<!-- Logo Container with Glow Effect -->
<div class="relative">
<!-- Subtle Glow Pulse Background -->
<div class="absolute inset-0 bg-primary/20 rounded-full blur-3xl scale-150"></div>
<div class="relative z-10 flex items-center justify-center w-40 h-40 rounded-3xl bg-gradient-to-br from-primary to-[#0a3180] shadow-2xl shadow-primary/40 ring-1 ring-white/10">
<span class="material-symbols-outlined text-white text-7xl font-light" style="">account_balance</span>
</div>
</div>
<!-- Text Branding -->
<div class="flex flex-col items-center justify-center space-y-2">
<h1 class="text-slate-100 text-4xl font-bold tracking-tight text-center" style="">Bankagement</h1>
<div class="h-1 w-12 bg-primary rounded-full mb-2"></div>
<p class="text-slate-400 text-lg font-medium tracking-wide text-center" style="">
                        Secure. Modern. Simple.
                    </p>
</div>
</div>
</div>
<!-- Footer / Progress Section -->
<div class="mt-auto p-8 pb-12 w-full max-w-sm mx-auto flex flex-col items-center gap-8">
<div class="flex flex-col gap-4 w-full">
<div class="flex items-center justify-between px-1">
<p class="text-slate-100 text-sm font-medium" style="">Securing connection...</p>
<p class="text-primary text-sm font-bold" style="">75%</p>
</div>
<!-- Custom Progress Bar -->
<div class="w-full h-1.5 rounded-full bg-slate-800 overflow-hidden ring-1 ring-white/5">
<div class="h-full bg-primary shadow-[0_0_10px_rgba(17,82,212,0.5)] transition-all duration-1000" style="width: 75%;"></div>
</div>
</div>
<div class="flex flex-col items-center gap-1">
<p class="text-slate-500 text-xs font-medium uppercase tracking-widest" style="">
                    v2.4.0 (Build 892)
                </p>
<p class="text-slate-600 text-[10px] font-normal text-center max-w-[240px]" style="">
                    Member FDIC. Equal Housing Lender. © 2024 Horizon Financial Group
                </p>
</div>
</div>
<!-- Background Elements for Visual Depth -->
<div class="absolute -top-20 -right-20 w-64 h-64 bg-primary/10 rounded-full blur-[100px]"></div>
<div class="absolute -bottom-20 -left-20 w-80 h-80 bg-primary/5 rounded-full blur-[120px]"></div>
</div>
</body></html>
